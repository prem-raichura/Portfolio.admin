services:

  backend:
    build: .

    container_name:
      portfolio_backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

  postgres:
    image: postgres:17

    container_name:
      portfolio_postgres

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: admin_portfolio

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name:
      portfolio_redis

    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: